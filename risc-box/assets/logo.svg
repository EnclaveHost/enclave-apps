<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- RISC Box: a real machine in a sealed box, a serial console with a pulse. -->
  <rect width="96" height="96" rx="18" fill="#0b0d12"/>
  <rect x="1.5" y="1.5" width="93" height="93" rx="16.5" fill="none" stroke="#252b38" stroke-width="3"/>
  <!-- console frame -->
  <rect x="18" y="20" width="60" height="46" rx="6" fill="#101620" stroke="#2a3242" stroke-width="2"/>
  <!-- prompt -->
  <text x="26" y="38" font-family="monospace" font-size="11" fill="#6bd0c4">&gt;_</text>
  <!-- the pulse: a heartbeat line across the screen = the machine is alive -->
  <polyline points="26,54 34,54 38,46 43,60 48,50 52,54 70,54"
            fill="none" stroke="#9be7dd" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- CPU socket beneath: this runs on the enclave's own silicon -->
  <rect x="34" y="72" width="28" height="14" rx="3" fill="#151b28" stroke="#2a3242" stroke-width="2"/>
  <g stroke="#6bd0c4" stroke-width="2">
    <line x1="40" y1="72" x2="40" y2="68"/><line x1="48" y1="72" x2="48" y2="68"/><line x1="56" y1="72" x2="56" y2="68"/>
  </g>
  <text x="48" y="82.5" font-family="monospace" font-size="7" fill="#6bd0c4" text-anchor="middle">rv64</text>
</svg>

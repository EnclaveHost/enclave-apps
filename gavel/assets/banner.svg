<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" font-family="monospace">
  <rect width="1600" height="400" fill="#0b0e14"/>
  <radialGradient id="g" cx="20%" cy="0%" r="90%">
    <stop offset="0%" stop-color="#d8b46a" stop-opacity=".10"/>
    <stop offset="60%" stop-color="#d8b46a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="400" fill="url(#g)"/>
  <rect x="6" y="6" width="1588" height="388" rx="18" fill="none" stroke="#1e2430" stroke-width="4"/>
  <!-- three sealed bids in, one price out -->
  <g fill="#151b28" stroke="#2a3242" stroke-width="4">
    <rect x="1040" y="90" width="120" height="72" rx="10"/>
    <rect x="1040" y="180" width="120" height="72" rx="10"/>
    <rect x="1040" y="270" width="120" height="72" rx="10"/>
  </g>
  <g fill="#d8b46a">
    <circle cx="1100" cy="119" r="9"/><circle cx="1100" cy="209" r="9"/><circle cx="1100" cy="299" r="9"/>
  </g>
  <g fill="#5a6375" font-size="22">
    <text x="1078" y="152">? ? ?</text>
    <text x="1078" y="242">? ? ?</text>
    <text x="1078" y="332">? ? ?</text>
  </g>
  <!-- the gavel, mid-swing -->
  <g transform="rotate(-45 1330 170)">
    <rect x="1270" y="140" width="120" height="58" rx="12" fill="#d8b46a"/>
    <rect x="1262" y="132" width="22" height="74" rx="7" fill="#d8b46a"/>
    <rect x="1376" y="132" width="22" height="74" rx="7" fill="#d8b46a"/>
    <rect x="1318" y="206" width="22" height="96" rx="10" fill="#8a94a6"/>
  </g>
  <!-- one number leaves -->
  <rect x="1240" y="300" width="190" height="52" rx="10" fill="none" stroke="#d8b46a" stroke-width="4"/>
  <text x="1268" y="336" font-size="30" fill="#d8b46a">SOLD 80</text>
  <text x="96" y="180" font-size="84" fill="#d8b46a">[ ga<tspan fill="#d7dde8" font-weight="bold">vel</tspan> ]</text>
  <text x="100" y="252" font-size="30" fill="#8a94a6">sealed-bid auctions nobody can rig</text>
  <text x="100" y="310" font-size="24" fill="#5a6375">bids sealed in attested RAM — not even the seller can peek</text>
  <text x="100" y="348" font-size="24" fill="#5a6375">at the hammer: winner + price out, losers scrubbed forever</text>
</svg>

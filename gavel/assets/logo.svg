<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- gavel: the hammer nobody can see past, over three sealed bids. -->
  <!-- mallet head, mid-swing at 45° -->
  <g transform="rotate(-45 44 38)">
    <rect x="28" y="30" width="32" height="16" rx="4" fill="#d8b46a"/>
    <rect x="26" y="28" width="6" height="20" rx="2" fill="#d8b46a"/>
    <rect x="56" y="28" width="6" height="20" rx="2" fill="#d8b46a"/>
    <!-- handle -->
    <rect x="41" y="48" width="6" height="26" rx="3" fill="#8a94a6"/>
  </g>
  <!-- three sealed bids under the hammer -->
  <g fill="#1e2430" stroke="#2a3242" stroke-width="2">
    <rect x="16" y="66" width="18" height="14" rx="3"/>
    <rect x="39" y="66" width="18" height="14" rx="3"/>
    <rect x="62" y="66" width="18" height="14" rx="3"/>
  </g>
  <g fill="#d8b46a">
    <circle cx="25" cy="73" r="2.5"/><circle cx="48" cy="73" r="2.5"/><circle cx="71" cy="73" r="2.5"/>
  </g>
</svg>

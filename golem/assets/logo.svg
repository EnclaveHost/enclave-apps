<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- golem: a clay head woken by the word on its brow; cursor blinking below. -->
  <!-- blocky clay head -->
  <g fill="#cf8a5b">
    <rect x="26" y="16" width="44" height="40" rx="8"/>
    <rect x="20" y="30" width="8" height="16" rx="3"/>
    <rect x="68" y="30" width="8" height="16" rx="3"/>
  </g>
  <!-- brow seal: the word that animates it -->
  <rect x="34" y="22" width="28" height="10" rx="3" fill="#241403"/>
  <text x="48" y="30.5" font-family="monospace" font-size="9" font-weight="700"
        fill="#eaa877" text-anchor="middle">&#1488;&#1502;&#1514;</text>
  <!-- eyes: dim until booted -->
  <rect x="34" y="38" width="10" height="8" rx="2" fill="#0b0e14"/>
  <rect x="52" y="38" width="10" height="8" rx="2" fill="#0b0e14"/>
  <rect x="36" y="40" width="6" height="4" fill="#7fd4a8"/>
  <rect x="54" y="40" width="6" height="4" fill="#7fd4a8"/>
  <!-- serial console chin: prompt + cursor -->
  <rect x="26" y="62" width="44" height="18" rx="5" fill="#151b28" stroke="#2a3242" stroke-width="2"/>
  <text x="32" y="74.5" font-family="monospace" font-size="9" fill="#8a94a6">&gt;</text>
  <rect x="40" y="67" width="6" height="9" fill="#eaa877"/>
</svg>

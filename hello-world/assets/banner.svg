<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" font-family="monospace">
  <!-- Hello World: smiley wordmark banner; the smallest attested app. -->
  <defs>
    <radialGradient id="glow" cx="18%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#f6c445" stop-opacity=".10"/>
      <stop offset="60%" stop-color="#f6c445" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="face" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#ffe08a"/>
      <stop offset="55%" stop-color="#f6c445"/>
      <stop offset="100%" stop-color="#e89f2e"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="400" fill="#0b0d12"/>
  <rect width="1600" height="400" fill="url(#glow)"/>
  <rect x="6" y="6" width="1588" height="388" rx="18" fill="none" stroke="#252b38" stroke-width="4"/>

  <!-- wordmark -->
  <text x="90" y="150" font-size="64" font-weight="700" fill="#f6c445">[ Hello <tspan fill="#ffe08a">World</tspan> ]</text>
  <text x="90" y="205" font-size="26" fill="#868ea0">the smallest thing that can run in an enclave;</text>
  <text x="90" y="240" font-size="26" fill="#868ea0">one wasm component, one attested reply</text>
  <text x="90" y="300" font-size="20" fill="#5b667a">GET / &#8594; wasi:http component in the TEE &#8594; Hello World!</text>

  <!-- the smiley, floating -->
  <g transform="translate(1150,55) scale(3)">
    <circle cx="48" cy="50" r="28" fill="url(#face)"/>
    <ellipse cx="40" cy="42" rx="3.2" ry="5.5" fill="#3a2c14"/>
    <ellipse cx="56" cy="42" rx="3.2" ry="5.5" fill="#3a2c14"/>
    <path d="M34 57 Q48 71 62 57" fill="none" stroke="#3a2c14" stroke-width="3.5" stroke-linecap="round"/>
  </g>
</svg>

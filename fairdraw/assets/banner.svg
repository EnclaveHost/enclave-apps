<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" font-family="monospace">
  <rect width="1600" height="400" fill="#0b0e14"/>
  <radialGradient id="g" cx="20%" cy="0%" r="90%">
    <stop offset="0%" stop-color="#c8cdd8" stop-opacity=".08"/>
    <stop offset="60%" stop-color="#c8cdd8" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="400" fill="url(#g)"/>
  <rect x="6" y="6" width="1588" height="388" rx="18" fill="none" stroke="#1e2430" stroke-width="4"/>
  <!-- tickets in the dark; one drawn, with the verification trail -->
  <g transform="translate(1120,60)">
    <g fill="#3a4256">
      <rect x="0" y="180" width="90" height="56" rx="8" transform="rotate(-6 45 208)"/>
      <rect x="120" y="196" width="90" height="56" rx="8" transform="rotate(4 165 224)"/>
      <rect x="240" y="184" width="90" height="56" rx="8" transform="rotate(-3 285 212)"/>
    </g>
    <g transform="rotate(-8 165 70)">
      <rect x="110" y="30" width="110" height="70" rx="10" fill="#c8cdd8"/>
      <circle cx="165" cy="65" r="14" fill="#0b0e14"/>
    </g>
    <g font-size="24" fill="#6fcf8f">
      <text x="30" y="300">✓ commit</text>
      <text x="160" y="300">✓ entries</text>
      <text x="290" y="300">✓ replay</text>
    </g>
  </g>
  <text x="96" y="180" font-size="84" fill="#c8cdd8">[ fair <tspan fill="#ffffff" font-weight="bold">draw</tspan> ]</text>
  <text x="100" y="252" font-size="30" fill="#8a94a6">raffles nobody can rig</text>
  <text x="100" y="310" font-size="24" fill="#5a6375">the salt is committed before the first entry · revealed at close</text>
  <text x="100" y="348" font-size="24" fill="#5a6375">recompute the winners in your own browser — don't take anyone's word</text>
</svg>

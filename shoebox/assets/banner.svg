  <text x="96" y="180" font-size="84" fill="#e8a34c">[ shoe <tspan fill="#d7dde8" font-weight="bold">box</tspan> ]</text>
  <text x="100" y="252" font-size="30" fill="#8a94a6">your files, decrypted only inside the enclave</text>
  <text x="100" y="310" font-size="24" fill="#5a6375">drop files in, browse the gallery, download — all in the enclave's ramdisk</text>
  <text x="100" y="348" font-size="24" fill="#5a6375">sync re-encrypts to your bucket · the operator only ever sees ciphertext</text>

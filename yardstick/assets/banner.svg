<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" font-family="monospace">
  <rect width="1600" height="400" fill="#0b0e14"/>
  <radialGradient id="g" cx="20%" cy="0%" r="90%">
    <stop offset="0%" stop-color="#a78bfa" stop-opacity=".10"/>
    <stop offset="60%" stop-color="#a78bfa" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="400" fill="url(#g)"/>
  <rect x="6" y="6" width="1588" height="388" rx="18" fill="none" stroke="#1e2430" stroke-width="4"/>
  <!-- sealed numbers in -->
  <g fill="#151b28" stroke="#2a3242" stroke-width="4">
    <rect x="1040" y="70" width="110" height="60" rx="10"/>
    <rect x="1040" y="150" width="110" height="60" rx="10"/>
    <rect x="1040" y="230" width="110" height="60" rx="10"/>
  </g>
  <g fill="#5a6375" font-size="26">
    <text x="1072" y="108">? ? ?</text>
    <text x="1072" y="188">? ? ?</text>
    <text x="1072" y="268">? ? ?</text>
  </g>
  <!-- the ruler -->
  <g transform="rotate(-18 1330 180)">
    <rect x="1210" y="150" width="250" height="52" rx="8" fill="#a78bfa"/>
    <g stroke="#241a3f" stroke-width="6" stroke-linecap="round">
      <path d="M1245 150 v18 M1285 150 v28 M1325 150 v18 M1365 150 v28 M1405 150 v18"/>
    </g>
  </g>
  <!-- only the aggregate leaves -->
  <rect x="1210" y="290" width="250" height="56" rx="10" fill="none" stroke="#a78bfa" stroke-width="4"/>
  <text x="1234" y="327" font-size="28" fill="#a78bfa">median 84,000</text>
  <text x="96" y="180" font-size="84" fill="#a78bfa">[ yard<tspan fill="#d7dde8" font-weight="bold">stick</tspan> ]</text>
  <text x="100" y="252" font-size="30" fill="#8a94a6">measure a group without showing your number</text>
  <text x="100" y="310" font-size="24" fill="#5a6375">salaries, rates, estimates — sealed in attested RAM, unread</text>
  <text x="100" y="348" font-size="24" fill="#5a6375">only aggregates of ≥ k numbers leave; the numbers are scrubbed</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" font-family="monospace">
  <rect width="1600" height="400" fill="#0b0e14"/>
  <radialGradient id="g" cx="20%" cy="0%" r="90%">
    <stop offset="0%" stop-color="#f2d54f" stop-opacity=".10"/>
    <stop offset="60%" stop-color="#f2d54f" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="400" fill="url(#g)"/>
  <rect x="6" y="6" width="1588" height="388" rx="18" fill="none" stroke="#1e2430" stroke-width="4"/>
  <!-- the trace, running off the right edge -->
  <path d="M1060 210 h90 l30 -80 55 160 40 -110 25 45 h140 l25 -60 40 90 30 -45 h60"
        fill="none" stroke="#f2d54f" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#6fcf8f"><circle cx="1105" cy="88" r="10"/></g>
  <g fill="#e8a34c"><circle cx="1105" cy="128" r="10"/></g>
  <g fill="#e05e5e"><circle cx="1105" cy="168" r="10"/></g>
  <g font-size="24" fill="#5a6375">
    <text x="1130" y="96">nightly-backup · up</text>
    <text x="1130" y="136">cert-renewal · late</text>
    <text x="1130" y="176">us-east cron · down</text>
  </g>
  <text x="96" y="180" font-size="84" fill="#f2d54f">[ <tspan fill="#d7dde8" font-weight="bold">pulse</tspan> ]</text>
  <text x="100" y="252" font-size="30" fill="#8a94a6">heartbeats in, status out</text>
  <text x="100" y="310" font-size="24" fill="#5a6375">your cron jobs curl the enclave — no agents, no egress, no faking green</text>
  <text x="100" y="348" font-size="24" fill="#5a6375">history nobody can edit · late and down the moment the beats stop</text>
</svg>

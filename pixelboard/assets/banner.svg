  <text x="96" y="180" font-size="84" fill="#6fcf8f">[ pixel <tspan fill="#d7dde8" font-weight="bold">board</tspan> ]</text>
  <text x="100" y="252" font-size="30" fill="#8a94a6">one shared canvas in enclave RAM</text>
  <text x="100" y="310" font-size="24" fill="#5a6375">128×128 · sixteen colors · a cooldown nobody can cheat</text>
  <text x="100" y="348" font-size="24" fill="#5a6375">when the funding ends, the art is gone</text>
</svg>

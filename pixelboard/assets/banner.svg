<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" font-family="monospace">
  <rect width="1600" height="400" fill="#0b0e14"/>
  <radialGradient id="g" cx="20%" cy="0%" r="90%">
    <stop offset="0%" stop-color="#6fcf8f" stop-opacity=".10"/>
    <stop offset="60%" stop-color="#6fcf8f" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="400" fill="url(#g)"/>
  <rect x="6" y="6" width="1588" height="388" rx="18" fill="none" stroke="#1e2430" stroke-width="4"/>
  <!-- a corner of the shared canvas, mid-painting -->
  <g transform="translate(1150,40)">
    <rect x="0" y="0" width="410" height="320" rx="10" fill="#141a26"/>
    <g>
      <rect x="30" y="30" width="52" height="52" fill="#6fcf8f"/>
      <rect x="82" y="30" width="52" height="52" fill="#6fcf8f"/>
      <rect x="134" y="30" width="52" height="52" fill="#4cc9e8"/>
      <rect x="30" y="82" width="52" height="52" fill="#e8a34c"/>
      <rect x="82" y="82" width="52" height="52" fill="#f2d54f"/>
      <rect x="134" y="82" width="52" height="52" fill="#e05e5e"/>
      <rect x="186" y="82" width="52" height="52" fill="#a78bfa"/>
      <rect x="82" y="134" width="52" height="52" fill="#5a8bf5"/>
      <rect x="134" y="134" width="52" height="52" fill="#e07ad0"/>
      <rect x="238" y="134" width="52" height="52" fill="#ffffff"/>
      <rect x="186" y="186" width="52" height="52" fill="#39b3a6"/>

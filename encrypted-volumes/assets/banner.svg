<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" font-family="monospace">
  <!-- encrypted volumes: vault-door wordmark banner; ciphertext out, files in. -->
  <defs>
    <radialGradient id="glow" cx="18%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#2dd4c8" stop-opacity=".10"/>
      <stop offset="60%" stop-color="#2dd4c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="door" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#57e6d8"/>
      <stop offset="55%" stop-color="#2dd4c8"/>
      <stop offset="100%" stop-color="#17a89e"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="400" fill="#0b0d12"/>
  <rect width="1600" height="400" fill="url(#glow)"/>
  <rect x="6" y="6" width="1588" height="388" rx="18" fill="none" stroke="#252b38" stroke-width="4"/>

  <!-- wordmark -->
  <text x="90" y="150" font-size="64" font-weight="700" fill="#2dd4c8">[ Encrypted <tspan fill="#8ff0e6">Volumes</tspan> ]</text>
  <text x="90" y="205" font-size="26" fill="#868ea0">your files ride your own bucket as rclone-crypt ciphertext;</text>
  <text x="90" y="240" font-size="26" fill="#868ea0">they decrypt only into enclave RAM, unlocked from your browser</text>
  <text x="90" y="300" font-size="20" fill="#5b667a">password in your browser &#8594; manager decrypts into /enc &#8594; plain std::fs for your app</text>

  <!-- the vault door, floating -->
  <g transform="translate(1140,55) scale(2.9)">
    <rect x="8" y="34" width="8" height="12" rx="2.5" fill="#128b84"/>
    <rect x="8" y="52" width="8" height="12" rx="2.5" fill="#128b84"/>
    <circle cx="50" cy="48" r="34" fill="url(#door)" stroke="#0d3b3f" stroke-width="3"/>
    <circle cx="50" cy="48" r="26" fill="none" stroke="#128b84" stroke-width="2"/>
    <g fill="#0d3b3f">
      <circle cx="80" cy="48" r="2.2"/>
      <circle cx="71.2" cy="69.2" r="2.2"/>
      <circle cx="50" cy="78" r="2.2"/>
      <circle cx="28.8" cy="69.2" r="2.2"/>
      <circle cx="20" cy="48" r="2.2"/>
      <circle cx="28.8" cy="26.8" r="2.2"/>
      <circle cx="50" cy="18" r="2.2"/>
      <circle cx="71.2" cy="26.8" r="2.2"/>
    </g>
    <circle cx="50" cy="48" r="14" fill="#0e3538"/>
    <g stroke="#2dd4c8" stroke-width="1.6" stroke-linecap="round">
      <line x1="50" y1="38.5" x2="50" y2="35.5"/>
      <line x1="50" y1="57.5" x2="50" y2="60.5"/>
      <line x1="40.5" y1="48" x2="37.5" y2="48"/>
      <line x1="59.5" y1="48" x2="62.5" y2="48"/>
      <line x1="43.3" y1="41.3" x2="41.2" y2="39.2"/>
      <line x1="56.7" y1="54.7" x2="58.8" y2="56.8"/>
      <line x1="43.3" y1="54.7" x2="41.2" y2="56.8"/>
      <line x1="56.7" y1="41.3" x2="58.8" y2="39.2"/>
    </g>
    <circle cx="50" cy="48" r="5.2" fill="#2dd4c8"/>
    <circle cx="50" cy="48" r="1.8" fill="#0e3538"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- encrypted volumes: a vault door; the dial only turns inside the enclave. -->
  <defs>
    <radialGradient id="door" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#57e6d8"/>
      <stop offset="55%" stop-color="#2dd4c8"/>
      <stop offset="100%" stop-color="#17a89e"/>
    </radialGradient>
  </defs>
  <!-- hinges -->
  <rect x="8" y="34" width="8" height="12" rx="2.5" fill="#128b84"/>
  <rect x="8" y="52" width="8" height="12" rx="2.5" fill="#128b84"/>
  <!-- door -->
  <circle cx="50" cy="48" r="34" fill="url(#door)" stroke="#0d3b3f" stroke-width="3"/>
  <circle cx="50" cy="48" r="26" fill="none" stroke="#128b84" stroke-width="2"/>
  <!-- rivets -->
  <g fill="#0d3b3f">
    <circle cx="80" cy="48" r="2.2"/>
    <circle cx="71.2" cy="69.2" r="2.2"/>
    <circle cx="50" cy="78" r="2.2"/>
    <circle cx="28.8" cy="69.2" r="2.2"/>
    <circle cx="20" cy="48" r="2.2"/>
    <circle cx="28.8" cy="26.8" r="2.2"/>
    <circle cx="50" cy="18" r="2.2"/>
    <circle cx="71.2" cy="26.8" r="2.2"/>
  </g>
  <!-- combination dial -->
  <circle cx="50" cy="48" r="14" fill="#0e3538"/>
  <g stroke="#2dd4c8" stroke-width="1.6" stroke-linecap="round">
    <line x1="50" y1="38.5" x2="50" y2="35.5"/>
    <line x1="50" y1="57.5" x2="50" y2="60.5"/>
    <line x1="40.5" y1="48" x2="37.5" y2="48"/>
    <line x1="59.5" y1="48" x2="62.5" y2="48"/>
    <line x1="43.3" y1="41.3" x2="41.2" y2="39.2"/>
    <line x1="56.7" y1="54.7" x2="58.8" y2="56.8"/>
    <line x1="43.3" y1="54.7" x2="41.2" y2="56.8"/>
    <line x1="56.7" y1="41.3" x2="58.8" y2="39.2"/>
  </g>
  <circle cx="50" cy="48" r="5.2" fill="#2dd4c8"/>
  <circle cx="50" cy="48" r="1.8" fill="#0e3538"/>
</svg>

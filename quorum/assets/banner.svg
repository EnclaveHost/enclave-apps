<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" font-family="monospace">
  <rect width="1600" height="400" fill="#0b0e14"/>
  <radialGradient id="g" cx="20%" cy="0%" r="90%">
    <stop offset="0%" stop-color="#8fa3f7" stop-opacity=".10"/>
    <stop offset="60%" stop-color="#8fa3f7" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="400" fill="url(#g)"/>
  <rect x="6" y="6" width="1588" height="388" rx="18" fill="none" stroke="#1e2430" stroke-width="4"/>
  <!-- five seats, three lit; the vault cracks at the line -->
  <g transform="translate(1090,90)">
    <circle cx="40" cy="40" r="34" fill="#8fa3f7"/>
    <circle cx="130" cy="40" r="34" fill="#8fa3f7"/>
    <circle cx="220" cy="40" r="34" fill="#8fa3f7"/>
    <circle cx="310" cy="40" r="34" fill="none" stroke="#3a4256" stroke-width="9"/>
    <circle cx="400" cy="40" r="34" fill="none" stroke="#3a4256" stroke-width="9"/>
    <g stroke="#0d1124" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M26 40 l10 11 20 -22"/>
      <path d="M116 40 l10 11 20 -22"/>
      <path d="M206 40 l10 11 20 -22"/>
    </g>
    <text x="180" y="190" font-size="56" fill="#b8c4ff" text-anchor="middle">3 of 5</text>
    <text x="180" y="240" font-size="26" fill="#5a6375" text-anchor="middle">quorum met · released</text>
  </g>
  <text x="96" y="180" font-size="84" fill="#8fa3f7">[ <tspan fill="#d7dde8" font-weight="bold">quorum</tspan> ]</text>
  <text x="100" y="252" font-size="30" fill="#8a94a6">M of N must agree — the enclave counts</text>
  <text x="100" y="310" font-size="24" fill="#5a6375">break-glass secrets · two-person rules nobody can bypass</text>
  <text x="100" y="348" font-size="24" fill="#5a6375">who approved stays private · the count is public · release is one-way</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" font-family="monospace">
  <rect width="1600" height="400" fill="#0b0e14"/>
  <radialGradient id="g" cx="20%" cy="0%" r="90%">
    <stop offset="0%" stop-color="#5a8bf5" stop-opacity=".10"/>
    <stop offset="60%" stop-color="#5a8bf5" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="400" fill="url(#g)"/>
  <rect x="6" y="6" width="1588" height="388" rx="18" fill="none" stroke="#1e2430" stroke-width="4"/>
  <!-- a parcel arcing between two hands (points) -->
  <g fill="#5a8bf5">
    <rect x="1120" y="300" width="56" height="56" rx="10"/>
    <rect x="1460" y="80" width="56" height="56" rx="10"/>
  </g>
  <rect x="1270" y="150" width="110" height="110" rx="16" fill="#8db0ff"/>
  <g fill="#3a4256">
    <rect x="1200" y="260" width="30" height="30" rx="6"/>
    <rect x="1410" y="120" width="30" height="30" rx="6"/>
  </g>
  <text x="96" y="180" font-size="84" fill="#5a8bf5">[ hand <tspan fill="#d7dde8" font-weight="bold">off</tspan> ]</text>
  <text x="100" y="252" font-size="30" fill="#8a94a6">files through an attested enclave</text>
  <text x="100" y="310" font-size="24" fill="#5a6375">encrypted before they leave your machine · even the name</text>
  <text x="100" y="348" font-size="24" fill="#5a6375">erased on delivery · downloads count on completion</text>
</svg>
